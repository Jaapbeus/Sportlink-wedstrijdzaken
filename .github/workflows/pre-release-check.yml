name: Pre-release check (develop → main)

# Draait uitsluitend op PRs die naar main gaan.
# Blokkeert de merge als de database niet Online is of de build faalt.
# Configureer 'db-check' en 'build-check' als required status checks
# in GitHub branch protection voor de main-branch.

on:
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  SQL_SERVER:         ${{ vars.AZURE_SQL_SERVER_NAME }}
  SQL_DATABASE:       ${{ vars.AZURE_SQL_DATABASE_NAME }}
  SQL_RESOURCE_GROUP: ${{ vars.AZURE_SQL_RESOURCE_GROUP }}

jobs:
  # ── 1. Database beschikbaarheidscheck ─────────────────────────────────────
  # Blokkeert de merge als de database Paused, AutoPaused of unavailable is.
  # Wordt overgeslagen als AZURE_SQL_SERVER_NAME niet geconfigureerd is (fork).
  db-check:
    name: "Database beschikbaar voor deploy"
    runs-on: ubuntu-latest
    if: vars.AZURE_SQL_SERVER_NAME != '' && vars.AZURE_SQL_DATABASE_NAME != ''
    steps:
      - name: Azure inloggen
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "▶ Database hervatten indien gepauzeerd en status verifiëren"
        run: |
          STATUS=$(az sql db show \
            --name "$SQL_DATABASE" \
            --resource-group "$SQL_RESOURCE_GROUP" \
            --server "$SQL_SERVER" \
            --query 'status' --output tsv 2>/dev/null || echo "unknown")
          echo "Database status: $STATUS"

          if [ "$STATUS" = "Disabled" ]; then
            echo "::error::⛔ Database uitgeschakeld — maandlimiet bereikt. Wacht tot begin volgende maand."
            exit 1
          fi

          if [ "$STATUS" = "Paused" ] || [ "$STATUS" = "AutoPaused" ]; then
            echo "Database is gepauzeerd — verbindingspoging om auto-resume te triggeren..."

            # Voeg runner-IP toe aan firewall zodat de TCP-verbinding de database bereikt
            RUNNER_IP=$(curl -s https://api.ipify.org)
            RULE_NAME="db-check-pr-${{ github.run_id }}"
            az sql server firewall-rule create \
              --resource-group "$SQL_RESOURCE_GROUP" \
              --server "$SQL_SERVER" \
              --name "$RULE_NAME" \
              --start-ip-address "$RUNNER_IP" \
              --end-ip-address "$RUNNER_IP" 2>/dev/null || echo "Firewall rule aanmaken mislukt — doorgaan"

            # TCP-verbindingspoging triggert Azure SQL Serverless auto-resume (SYN naar poort 1433)
            timeout 5 bash -c "echo > /dev/tcp/$SQL_SERVER.database.windows.net/1433" 2>/dev/null \
              && echo "TCP-verbinding gelukt" \
              || echo "TCP-verbindingspoging verstuurd (auto-resume gestart)"

            for i in $(seq 1 20); do
              sleep 15
              STATUS=$(az sql db show \
                --name "$SQL_DATABASE" \
                --resource-group "$SQL_RESOURCE_GROUP" \
                --server "$SQL_SERVER" \
                --query 'status' --output tsv 2>/dev/null || echo "unknown")
              echo "  Check $i/20: $STATUS"
              [ "$STATUS" = "Online" ] && break
            done

            # Firewall-regel opruimen (ook bij fout)
            az sql server firewall-rule delete \
              --resource-group "$SQL_RESOURCE_GROUP" \
              --server "$SQL_SERVER" \
              --name "$RULE_NAME" \
              --yes 2>/dev/null || true

            if [ "$STATUS" != "Online" ]; then
              echo "::error::⛔ Database nog niet Online na wachten (status: $STATUS)."
              exit 1
            fi
          fi

          if [ "$STATUS" = "unknown" ]; then
            echo "::warning::⚠️ Database-status onbekend — merge toegestaan, controleer handmatig."
          else
            echo "✓ Database $STATUS — release mag doorgaan"
          fi

  # ── 2. Build-verificatie ──────────────────────────────────────────────────
  # Controleert dat FunctionApp en BlazorAdmin compileren op de te mergen code.
  build-check:
    name: "Build geslaagd vóór release"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: FunctionApp bouwen
        run: dotnet build FunctionApp/fa-dev-sportlink-01.csproj -c Release

      - name: BlazorAdmin bouwen
        run: dotnet build BlazorAdmin/BlazorAdmin.csproj -c Release
