name: Deploy naar Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: func-vrc-sportlink
  AZURE_FUNCTIONAPP_PACKAGE_PATH: FunctionApp
  DOTNET_VERSION: '9.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Function App bouwen
        run: |
          dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/fa-dev-sportlink-01.csproj \
            --configuration Release \
            --output ./output

      - name: Function App deployen naar Azure
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./output
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Wacht op Function App opstart
        run: sleep 30

      - name: "Test: planner endpoint bereikbaar (function key → 200)"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/planner/check-availability?code=${{ secrets.AZURE_FUNCTION_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"datum":"2026-12-01","leeftijdsCategorie":"JO13"}')
          echo "check-availability: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "FOUT: verwacht 200"; exit 1; fi

      - name: "Test: admin endpoint beveiligd (function key → 401)"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/sync-matches?code=${{ secrets.AZURE_FUNCTION_KEY }}")
          echo "sync-matches: $STATUS"
          if [ "$STATUS" != "401" ]; then echo "FOUT: verwacht 401"; exit 1; fi

      - name: "Test: admin endpoint beveiligd (function key → 401)"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/planner/populate-sunset?code=${{ secrets.AZURE_FUNCTION_KEY }}")
          echo "populate-sunset: $STATUS"
          if [ "$STATUS" != "401" ]; then echo "FOUT: verwacht 401"; exit 1; fi
