name: Deploy naar Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: func-vrc-sportlink
  AZURE_FUNCTIONAPP_PACKAGE_PATH: FunctionApp
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Function App bouwen
        shell: bash
        run: |
          dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/fa-dev-sportlink-01.csproj \
            --configuration Release \
            --output ./output

      - name: Function App deployen naar Azure
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./output
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  deploy-database:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: sqlpackage installeren
        run: dotnet tool install -g microsoft.sqlpackage

      - name: Database project bouwen
        run: dotnet build Database/SportlinkSqlDb.sqlproj -c Release

      - name: Database deployen naar Azure SQL
        run: |
          sqlpackage /Action:Publish \
            /SourceFile:Database/bin/Release/SportlinkSqlDb.dacpac \
            /TargetConnectionString:"${{ secrets.SQL_CONNECTION_STRING }}"
