name: Deploy naar Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: FunctionApp
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Repository-variabelen — geconfigureerd in GitHub repo Settings → Variables.
  # Hier gedeclareerd zodat de linter ze kent; gebruik $SQL_SERVER/$SQL_DATABASE/$SQL_RESOURCE_GROUP
  # in run-scripts en env.SQL_* in if-conditions.
  SQL_SERVER: ${{ vars.AZURE_SQL_SERVER_NAME }}
  SQL_DATABASE: ${{ vars.AZURE_SQL_DATABASE_NAME }}
  SQL_RESOURCE_GROUP: ${{ vars.AZURE_SQL_RESOURCE_GROUP }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # db-check: controleert de Azure SQL Free-tier database-status VÓÓR alles.
  # Als de DB niet Online is wordt de volledige pipeline geblokkeerd:
  #   build → db-migrate, blazor-deploy en test worden allemaal overgeslagen.
  # Vereist variabele AZURE_SQL_DATABASE_NAME (naast de al bestaande server/rg-vars).
  # Wordt overgeslagen als AZURE_SQL_SERVER_NAME of AZURE_SQL_DATABASE_NAME niet
  # geconfigureerd is (fork / nieuw project zonder SQL-vars) — dan loopt build gewoon door.
  # ──────────────────────────────────────────────────────────────────────────
  db-check:
    runs-on: ubuntu-latest
    if: vars.AZURE_SQL_SERVER_NAME != '' && vars.AZURE_SQL_DATABASE_NAME != ''
    steps:
      - name: Azure inloggen
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "⛔ Database status controleren (ARM API — vóór migratie en deploy)"
        run: |
          STATUS=$(az sql db show \
            --name "$SQL_DATABASE" \
            --resource-group "$SQL_RESOURCE_GROUP" \
            --server "$SQL_SERVER" \
            --query 'status' --output tsv 2>/dev/null || echo "unknown")
          echo "Database status: $STATUS"
          if [ "$STATUS" != "Online" ]; then
            echo "::error::⛔ Database is '$STATUS' — volledige deployment geblokkeerd."
            echo "::error::Breng de database online vóór deployment:"
            echo "::error::  Azure Portal → SQL Database → Overzicht → Resume"
            echo "::error::Of wacht tot de maandlimiet vernieuwd is (begin volgende kalendermaand)."
            exit 1
          fi
          echo "✓ Database Online — deployment mag doorgaan"

  build:
    runs-on: ubuntu-latest
    # Wacht op db-check. Als db-check FAILED → build wordt overgeslagen (en alles daarna ook).
    # Als db-check SKIPPED (vars niet ingesteld) → build loopt gewoon door (backward compatible).
    needs: db-check
    if: always() && (needs.db-check.result == 'success' || needs.db-check.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Function App bouwen
        run: |
          dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/fa-dev-sportlink-01.csproj \
            --configuration Release \
            --output ./output

      - name: Artefact uploaden
        uses: actions/upload-artifact@v4
        with:
          name: functionapp
          path: ./output

  deploy:
    runs-on: ubuntu-latest
    needs: [build, db-migrate]
    # Deploy pas na succesvolle migratie — als db-migrate overgeslagen is (geen SQL-vars) mag deploy doorgaan. (#430)
    if: always() && needs.build.result == 'success' && (needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped')
    steps:
      - name: Artefact downloaden
        uses: actions/download-artifact@v4
        with:
          name: functionapp
          path: ./output

      - name: Azure inloggen
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Function App deployen naar Azure
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: ./output

  db-migrate:
    runs-on: ubuntu-latest
    needs: build
    # Wordt overgeslagen als AZURE_SQL_SERVER_NAME niet geconfigureerd is (fork / nieuw project).
    # Vereiste: secret SQL_CONNECTION_STRING, vars AZURE_SQL_RESOURCE_GROUP + AZURE_SQL_SERVER_NAME.
    if: vars.AZURE_SQL_SERVER_NAME != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure inloggen
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Runner-IP toevoegen aan SQL-firewall
        id: firewall
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          RULE_NAME="github-actions-${{ github.run_id }}"
          az sql server firewall-rule create \
            --resource-group "$SQL_RESOURCE_GROUP" \
            --server "$SQL_SERVER" \
            --name "$RULE_NAME" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"
          echo "rule_name=$RULE_NAME" >> $GITHUB_OUTPUT

      - name: Database-migratie uitvoeren (PostDeployment script — idempotent)
        uses: azure/sql-action@v2.3
        with:
          connection-string: ${{ secrets.SQL_CONNECTION_STRING }}
          path: Database/Script.PostDeployment1.sql

      - name: Runner-IP verwijderen uit SQL-firewall (altijd, ook bij fout)
        if: always() && steps.firewall.outputs.rule_name != ''
        run: |
          az sql server firewall-rule delete \
            --resource-group "$SQL_RESOURCE_GROUP" \
            --server "$SQL_SERVER" \
            --name "${{ steps.firewall.outputs.rule_name }}" \
            --yes || true

  test:
    runs-on: ubuntu-latest
    needs: [deploy]
    # Deploy wordt overgeslagen als server niet geconfigureerd — test mag altijd doorgaan als deploy slaagt
    if: always() && needs.deploy.result == 'success'
    steps:
      - name: "Smoke test: function app bereikbaar (health → 200)"
        run: |
          URL="https://${{ vars.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/health?code=${{ secrets.AZURE_FUNCTION_KEY }}"
          MAX=6
          WAIT=20
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || true)
            echo "Poging $i/$MAX — health: $STATUS"
            if [ "$STATUS" = "200" ]; then exit 0; fi
            if [ "$i" -lt "$MAX" ]; then echo "Wacht ${WAIT}s (cold start)..."; sleep $WAIT; fi
          done
          echo "FOUT: health gaf $STATUS na $MAX pogingen (verwacht 200)"
          exit 1

      - name: "Smoke test: admin endpoint beveiligd (function key → 401)"
        run: |
          URL="https://${{ vars.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/sync-matches?code=${{ secrets.AZURE_FUNCTION_KEY }}"
          MAX=6; WAIT=20
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || true)
            echo "Poging $i/$MAX — sync-matches: $STATUS"
            if [ "$STATUS" = "401" ]; then exit 0; fi
            if [ "$STATUS" = "503" ] && [ "$i" -lt "$MAX" ]; then
              echo "503 (cold start) — wacht ${WAIT}s..."; sleep $WAIT
            else
              echo "FOUT: verwacht 401, kreeg $STATUS"; exit 1
            fi
          done

      - name: "Smoke test: anonymous admin endpoint beveiligd zonder token (→ 401)"
        run: |
          URL="https://${{ vars.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/beheer/settings"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || true)
          echo "GET /api/beheer/settings zonder token: $STATUS"
          if [ "$STATUS" != "401" ]; then
            echo "FOUT: verwacht 401, kreeg $STATUS — EasyAuthHelper werkt niet correct"
            exit 1
          fi

      - name: "Smoke test: gefakete X-MS-CLIENT-PRINCIPAL wordt niet vertrouwd (→ 401)"
        run: |
          # Simuleert een aanvaller die admin-header meestuurt zonder geldig Entra-token.
          # Als Easy Auth actief is, strip Azure deze header vóór de Function.
          FAKE_PRINCIPAL=$(echo '{"auth_typ":"aad","claims":[{"typ":"roles","val":"admin"}],"name_typ":"","role_typ":"roles"}' | base64 -w 0)
          URL="https://${{ vars.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/beheer/settings"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "X-MS-CLIENT-PRINCIPAL: $FAKE_PRINCIPAL" \
            "$URL" || true)
          echo "GET /api/beheer/settings met gefakete principal: $STATUS"
          if [ "$STATUS" != "401" ]; then
            echo "FOUT: verwacht 401, kreeg $STATUS — Easy Auth mogelijk uitgeschakeld of niet geconfigureerd"
            exit 1
          fi

      - name: "Info: planner endpoint database-check"
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 -X POST \
            "https://${{ vars.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/planner/check-availability?code=${{ secrets.AZURE_FUNCTION_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"datum":"2026-12-01","leeftijdsCategorie":"JO13"}' || true)
          echo "check-availability: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "⚠️ Database mogelijk niet bereikbaar (status $STATUS)"; exit 1; fi

  blazor-deploy:
    runs-on: ubuntu-latest
    needs: build
    # TODO: Stel AZURE_STATIC_WEB_APPS_API_TOKEN in als GitHub Secret voor de SWA deploy.
    # Zie docs/BEHEERDER-HANDLEIDING.md voor het aanmaken van de SWA resource.
    # Job wordt overgeslagen als het secret leeg is — guard via env op step-niveau (secrets context
    # mag niet in job-level if direct staan).
    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
      SWA_HOSTNAME: ${{ vars.AZURE_STATIC_WEB_APP_HOSTNAME }}
    steps:
      - name: Token aanwezig?
        id: check
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "Geen SWA token ingesteld — Blazor deploy wordt overgeslagen."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v6

      - name: .NET SDK installeren
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: appsettings.Production.json genereren vanuit template
        if: steps.check.outputs.skip == 'false'
        env:
          AZURE_FUNCTIONAPP_URL: ${{ vars.AZURE_FUNCTIONAPP_URL }}
          AZURE_AD_TENANT_ID: ${{ vars.AZURE_AD_TENANT_ID }}
          AZURE_AD_CLIENT_ID: ${{ vars.AZURE_AD_CLIENT_ID }}
          POST_LOGOUT_REDIRECT_URL: ${{ vars.POST_LOGOUT_REDIRECT_URL }}
        run: |
          sed \
            -e "s|{{AZURE_FUNCTIONAPP_URL}}|${AZURE_FUNCTIONAPP_URL}|g" \
            -e "s|{{AZURE_AD_TENANT_ID}}|${AZURE_AD_TENANT_ID}|g" \
            -e "s|{{AZURE_AD_CLIENT_ID}}|${AZURE_AD_CLIENT_ID}|g" \
            -e "s|{{POST_LOGOUT_REDIRECT_URL}}|${POST_LOGOUT_REDIRECT_URL}|g" \
            BlazorAdmin/wwwroot/appsettings.Production.template.json \
            > BlazorAdmin/wwwroot/appsettings.Production.json
          echo "appsettings.Production.json gegenereerd (inhoud niet gelogd — bevat tenant/client IDs)"

      - name: Blazor WASM publiceren
        if: steps.check.outputs.skip == 'false'
        run: |
          dotnet publish BlazorAdmin/BlazorAdmin.csproj \
            --configuration Release \
            --output ./blazor-publish

      - name: Deploy naar Azure Static Web Apps
        if: steps.check.outputs.skip == 'false'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./blazor-publish/wwwroot"
          output_location: ""
          skip_app_build: true

      - name: Smoke test SWA bereikbaar
        if: steps.check.outputs.skip == 'false' && env.SWA_HOSTNAME != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://$SWA_HOSTNAME/")
          echo "SWA: $STATUS"
          if [ "$STATUS" -ge 500 ]; then echo "FOUT: SWA gaf $STATUS"; exit 1; fi
