name: Deploy naar Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: func-vrc-sportlink
  AZURE_FUNCTIONAPP_PACKAGE_PATH: FunctionApp
  DOTNET_VERSION: '9.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Function App bouwen
        run: |
          dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/fa-dev-sportlink-01.csproj \
            --configuration Release \
            --output ./output

      - name: Azure inloggen
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Function App deployen naar Azure
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./output

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: "Smoke test: planner endpoint bereikbaar (function key → 200)"
        run: |
          URL="https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/planner/check-availability?code=${{ secrets.AZURE_FUNCTION_KEY }}"
          MAX=8          # max pogingen
          WAIT=30        # seconden tussen pogingen (totaal max ~4 min)
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 -X POST "$URL" \
              -H "Content-Type: application/json" \
              -d '{"datum":"2026-12-01","leeftijdsCategorie":"JO13"}')
            echo "Poging $i/$MAX — check-availability: $STATUS"
            if [ "$STATUS" = "200" ]; then exit 0; fi
            if [ "$i" -lt "$MAX" ]; then echo "Wacht ${WAIT}s (cold start / database wake-up)..."; sleep $WAIT; fi
          done
          echo "FOUT: check-availability gaf $STATUS na $MAX pogingen (verwacht 200)"
          exit 1

      - name: "Smoke test: admin endpoint beveiligd (function key → 401)"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/sync-matches?code=${{ secrets.AZURE_FUNCTION_KEY }}")
          echo "sync-matches: $STATUS"
          if [ "$STATUS" != "401" ]; then echo "FOUT: verwacht 401, kreeg $STATUS"; exit 1; fi
