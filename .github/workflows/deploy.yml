name: Deploy naar Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: func-vrc-sportlink
  AZURE_FUNCTIONAPP_PACKAGE_PATH: FunctionApp
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: .NET SDK installeren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Function App bouwen
        shell: bash
        run: |
          dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/fa-dev-sportlink-01.csproj \
            --configuration Release \
            --output ./output

      - name: Function App deployen naar Azure
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./output
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  test-endpoints:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Wacht op Function App opstart
        run: sleep 30

      - name: "Test: check-availability met function key moet 200 geven"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/planner/check-availability?code=${{ secrets.AZURE_FUNCTION_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"datum":"2026-04-18","aanvangsTijd":"12:00","leeftijdsCategorie":"JO13"}')
          echo "check-availability status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "FOUT: verwacht 200, kreeg $STATUS"; exit 1; fi

      - name: "Test: sync-matches met function key moet 401 geven (admin only)"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/sync-matches?code=${{ secrets.AZURE_FUNCTION_KEY }}")
          echo "sync-matches status: $STATUS"
          if [ "$STATUS" != "401" ]; then echo "FOUT: verwacht 401, kreeg $STATUS"; exit 1; fi

      - name: "Test: populate-sunset met function key moet 401 geven (admin only)"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/planner/populate-sunset?code=${{ secrets.AZURE_FUNCTION_KEY }}")
          echo "populate-sunset status: $STATUS"
          if [ "$STATUS" != "401" ]; then echo "FOUT: verwacht 401, kreeg $STATUS"; exit 1; fi
