name: Release aanmaken

# Wordt getriggerd wanneer een versie-tag wordt gepusht naar main.
# Gebruik: git tag v2.0.1 && git push origin v2.0.1
# Of handmatig via GitHub Actions UI (workflow_dispatch).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versienummer (bijv. 2.0.1)'
        required: true
        type: string
      prerelease:
        description: 'Pre-release (beta/rc)?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release aanmaken
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (volledige geschiedenis voor CHANGELOG-parsing)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Versienummer bepalen
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Tag: ${TAG}"

      - name: Release-notes uit CHANGELOG.md halen
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extraheer de sectie voor deze versie uit CHANGELOG.md
          # Zoekt naar ## [VERSION] en pakt alles tot de volgende ## [
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "⚠️  Geen entry voor versie ${VERSION} gevonden in CHANGELOG.md"
            NOTES="Zie CHANGELOG.md voor wijzigingen in versie ${VERSION}."
          fi

          # GitHub Actions multiline output
          {
            echo "notes<<CHANGELOG_EOF"
            echo "${NOTES}"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Tag aanmaken (alleen bij workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: GitHub Release aanmaken
        uses: actions/github-script@v7
        env:
          # Notes via env-var doorgeven — zo wordt CHANGELOG-content NIET als
          # JavaScript template literal geparsed. Backticks, ${...} en andere
          # markdown-tekens in CHANGELOG zouden anders een SyntaxError geven.
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        with:
          script: |
            const version = process.env.RELEASE_VERSION;
            const tag = process.env.RELEASE_TAG;
            const isPrerelease = process.env.RELEASE_PRERELEASE === 'true';
            const notes = process.env.RELEASE_NOTES || '';

            const major = parseInt(version.split('.')[0]);
            const isV2Plus = major >= 2;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `${tag} — Sportlink Wedstrijdzaken`,
              body: notes.trim() || `Zie [CHANGELOG.md](CHANGELOG.md) voor wijzigingen in versie ${version}.`,
              draft: false,
              prerelease: isPrerelease,
              make_latest: isV2Plus ? 'true' : 'false'
            });

            core.notice(`Release ${tag} aangemaakt`);
