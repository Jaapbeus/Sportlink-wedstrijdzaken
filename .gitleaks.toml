# Gitleaks configuratie — https://github.com/gitleaks/gitleaks
# Detecteert secrets en AVG/GDPR-gevoelige patronen.
# Wordt gebruikt door: pre-commit hook, GitHub Actions security-scan.yml

title = "Sportlink Wedstrijdzaken — Gitleaks Config"

[extend]
# Gebruik de standaard gitleaks rules als basis
useDefault = true

# ── Club-specifieke infrastructuurpatronen ────────────────────────────────────
# Structurele patronen: vangen clubcode-specifieke Azure-resource namen, SWA-URLs
# en infrastructuuridentifiers. GEEN echte waarden — puur op naamconventie.

[[rules]]
id = "azure-function-app-clubname"
description = "Azure Function App naam met clubcode (multi-club architectuurregel)"
regex = '''func-[a-z]{2,}-sportlink'''
tags = ["infrastructure", "club-data"]

[[rules]]
id = "azure-swa-clubname"
description = "Azure Static Web App naam met clubcode"
regex = '''swa-[a-z]{2,}-sportlink'''
tags = ["infrastructure", "club-data"]

[[rules]]
id = "azure-storage-clubname"
description = "Azure Storage Account naam met clubcode (st<clubcode>sportlink formaat)"
regex = '''st[a-z]{2,}sportlink'''
tags = ["infrastructure", "club-data"]

[[rules]]
id = "azure-appinsights-clubname"
description = "Application Insights naam met clubcode"
regex = '''ai-[a-z]{2,}-sportlink'''
tags = ["infrastructure", "club-data"]

[[rules]]
id = "azurestaticapps-url"
description = "Azure Static Web Apps productie-URL (uniek per installatie)"
regex = '''[a-z0-9-]+\.\d+\.azurestaticapps\.net'''
tags = ["infrastructure", "club-data"]

[[rules]]
id = "azurewebsites-sportlink-url"
description = "Azure Functions productie-URL voor Sportlink installaties"
regex = '''[a-z0-9-]+-sportlink\.azurewebsites\.net'''
tags = ["infrastructure", "club-data"]

[[rules]]
id = "azure-sql-server-name"
description = "Azure SQL Server naam (patroon: letters+cijfers+streepje gevolgd door .database.windows.net)"
regex = '''[a-z0-9][a-z0-9-]{2,}\.database\.windows\.net'''
tags = ["infrastructure", "club-data"]

# ── Aanvullende regels voor dit project ───────────────────────────────────────

[[rules]]
id = "dutch-mobile-number"
description = "Dutch mobile phone number (AVG/GDPR personal data)"
regex = '''06[-\s]?[0-9]{8}'''
tags = ["pii", "avg", "gdpr"]

[[rules]]
id = "dutch-mobile-plus31"
description = "Dutch mobile number in international format"
regex = '''\+316[0-9]{8}'''
tags = ["pii", "avg", "gdpr"]

[[rules]]
id = "sportlink-member-code"
description = "Sportlink member/license code"
regex = '''BCZ[A-Z][A-Z0-9]{5}'''
tags = ["pii", "avg", "gdpr", "sportlink"]

[[rules]]
id = "consumer-email"
description = "Consumer email address (likely personal data)"
regex = '''[a-zA-Z0-9._%+\-]+@(hotmail\.(com|nl)|gmail\.com|outlook\.(com|nl)|ziggo\.nl|kpnmail\.nl|casema\.nl|home\.nl|planet\.nl|tele2\.nl)'''
tags = ["pii", "avg", "gdpr"]

# ── Paden altijd uitsluiten ───────────────────────────────────────────────────

[allowlist]
description = "Bestanden die uitgesloten worden van scanning"
regexes = [
  # voorbeeld.nl is een goedgekeurd fictief placeholder-domein (John Doe-principe, zie CLAUDE.md).
  '''trainer@voorbeeld\.nl''',
  # Jan de Vries is een fictieve naam (NL John Doe equivalent) — geen echte persoonsgegevens.
  '''Jan de Vries''',
  # Placeholder-patronen in documentatie zijn geen echte waarden
  '''\[clubcode\]''',
  '''\[swa-url\]''',
  '''\[TENANT_ID\]''',
  '''\[CLIENT_ID\]''',
  '''\[sql-servernaam\]''',
  '''\[club-domein\]''',
  '''\[beheerder\]''',
  # infrastructure/ sjabloonwaarden met <> placeholders zijn geen echte resourcenamen
  '''<clubcode>''',
]
paths = [
  '''\.git/''',
  '''bin/''',
  '''obj/''',
  '''sensitive-patterns\.template\.txt''',
  '''local\.settings\.template\.json''',
]
# Commit-SHA allowlist — leegmaken na git-history-rewrite (SHAs veranderen bij filter-repo).
commits = [
  # ead9d0cc — initial Clean-GitHistory.ps1 had lowercase 'clubcode' placeholders.
  # Fixed in e3adf22 (uppercase CLUB). SHA hier zodat gitleaks de introducing commit overslaat.
  "ead9d0cc3b3a21212feb5d301f0a8cdf18d8a75a",
]
