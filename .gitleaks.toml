# Gitleaks configuratie — https://github.com/gitleaks/gitleaks
# Detecteert secrets en AVG/GDPR-gevoelige patronen.
# Wordt gebruikt door: pre-commit hook, GitHub Actions security-scan.yml

title = "Sportlink Wedstrijdzaken — Gitleaks Config"

[extend]
# Gebruik de standaard gitleaks rules als basis
useDefault = true

# ── Aanvullende regels voor dit project ───────────────────────────────────────

[[rules]]
id = "dutch-mobile-number"
description = "Dutch mobile phone number (AVG/GDPR personal data)"
regex = '''06[-\s]?[0-9]{8}'''
tags = ["pii", "avg", "gdpr"]

[[rules]]
id = "dutch-mobile-plus31"
description = "Dutch mobile number in international format"
regex = '''\+316[0-9]{8}'''
tags = ["pii", "avg", "gdpr"]

[[rules]]
id = "sportlink-member-code"
description = "Sportlink member/license code"
regex = '''BCZ[A-Z][A-Z0-9]{5}'''
tags = ["pii", "avg", "gdpr", "sportlink"]

[[rules]]
id = "consumer-email"
description = "Consumer email address (likely personal data)"
regex = '''[a-zA-Z0-9._%+\-]+@(hotmail\.(com|nl)|gmail\.com|outlook\.(com|nl)|ziggo\.nl|kpnmail\.nl|casema\.nl|home\.nl|planet\.nl|tele2\.nl)'''
tags = ["pii", "avg", "gdpr"]

# ── Paden altijd uitsluiten ───────────────────────────────────────────────────

[allowlist]
description = "Bestanden die uitgesloten worden van scanning"
regexes = [
  # voorbeeld.nl is een goedgekeurd fictief placeholder-domein (John Doe-principe, zie CLAUDE.md).
  # Niet bestaand domein — geen echte persoonsgegevens. Gebruikt als UI-default in de dry-run tester.
  '''trainer@voorbeeld\.nl''',
  # Jan de Vries is een fictieve naam (NL John Doe equivalent) — geen echte persoonsgegevens.
  '''Jan de Vries''',
]
paths = [
  # Gegenereerde bestanden en build output
  '''\.git/''',
  '''bin/''',
  '''obj/''',
  # Template-bestanden (bevatten geen echte data)
  '''sensitive-patterns\.template\.txt''',
  '''local\.settings\.template\.json''',
  # Eerder was hier een brede uitsluiting voor Database/.*\.sql — verwijderd in #212.
  # SQL-bestanden worden nu volledig gescand. Bij valse positieven: specifiek bestand toevoegen.
]
# Historische commits met voorbeeldwaarden die patronen triggeren — geen echte PII.
# Zie bijbehorende GitHub issue voor permanente strategie (filter-repo of accept).
commits = [
  # 5311d64: "security: drie-laags AVG-bewaking voor documentatie en changelog"
  # docs/VERSIONING.md bevatte voorbeeld-email/telefoon ter illustratie van wat NIET mag.
  # Direct hersteld in commit 70173cb door beschrijvende tekst.
  "5311d642e3c0b1f8b74e3ca2e733785e36a12a66",
]
