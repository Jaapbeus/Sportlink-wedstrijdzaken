openapi: 3.0.3
info:
  title: Sportlink Wedstrijdzaken API
  description: |
    API voor het beheer van wedstrijden, veldplanning en club-instellingen.

    ## Beveiliging

    Twee beveiligingsschema's:

    - **functionKey** — `?code=` queryparameter, vereist voor planner- en sync-endpoints.
      Gebruik de Azure Function key (voor planner-endpoints) of de Master key (voor admin sync-matches en
      populate-sunset).
    - **easyAuth** — Azure Easy Auth Bearer token (Entra ID) in de `Authorization`-header, vereist voor
      alle `/beheer/`- en `/feedback/`-endpoints. Lokaal omzeild wanneer de omgevingsvariabele
      `WEBSITE_SITE_NAME` afwezig is.

    Alle `/beheer/`- en `/feedback/`-endpoints retourneren de header `x-correlation-id` in het antwoord.
  version: 2.2.0
  contact:
    name: Sportlink Wedstrijdzaken
    url: https://github.com/jaapbeus/Sportlink-wedstrijdzaken

servers:
  - url: https://func-vrc-sportlink.azurewebsites.net/api
    description: Productie (Azure Functions)
  - url: http://localhost:7094/api
    description: Lokale ontwikkeling (func start)

tags:
  - name: core
    description: Health en handmatige Sportlink-synchronisatie
  - name: planner
    description: Veldplanning, beschikbaarheidscontrole en optimalisatie
  - name: beheer
    description: Beheerfuncties (vereisen Entra ID authenticatie met admin-rol)
  - name: feedback
    description: Feedback widget (vereist Entra ID authenticatie met admin-rol)

# ─────────────────────────────────────────────────────────────────────────────
# Beveiligingsschema's
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    functionKey:
      type: apiKey
      in: query
      name: code
      description: |
        Azure Functions key. Gebruik de Function key voor planner-endpoints en de Master key voor
        sync-matches en populate-sunset (AuthorizationLevel.Admin).
    easyAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Azure Easy Auth Bearer token (Entra ID). De Function App valideert dit token via Easy Auth
        en injecteert `X-MS-CLIENT-PRINCIPAL`. EasyAuthHelper controleert de `admin`-rol op alle
        /beheer/- en /feedback/-endpoints. Lokaal altijd toegestaan als WEBSITE_SITE_NAME afwezig is.

  # ───────────────────────────────────────────────────────────────────────────
  # Herbruikbare headers
  # ───────────────────────────────────────────────────────────────────────────
  headers:
    CorrelationId:
      description: Uniek verzoek-ID voor tracing in logs
      schema:
        type: string
        format: uuid

  # ───────────────────────────────────────────────────────────────────────────
  # Herbruikbare antwoorden
  # ───────────────────────────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Authenticatie ontbreekt of is ongeldig
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Geen admin-rol in het token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Verzoek ongeldig (verplicht veld ontbreekt of validatiefout)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource niet gevonden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Interne serverfout
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ───────────────────────────────────────────────────────────────────────────
  # Schema's
  # ───────────────────────────────────────────────────────────────────────────
  schemas:

    # ── Generiek ──────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Foutomschrijving
      required:
        - error
      example:
        error: "Request body met 'datum' veld is verplicht."

    # ── Planner ───────────────────────────────────────────────────────────────

    SlotToewijzing:
      type: object
      description: Toegewezen of alternatief tijdslot
      properties:
        datum:
          type: string
          format: date
          example: "2026-04-18"
        aanvangsTijd:
          type: string
          pattern: '^[0-2]\d:[0-5]\d$'
          example: "12:00"
        eindTijd:
          type: string
          pattern: '^[0-2]\d:[0-5]\d$'
          example: "13:15"
        veldNummer:
          type: integer
          example: 3
        veldNaam:
          type: string
          example: "veld 3"
        veldDeelGebruik:
          type: number
          format: float
          description: Fractie van het veld (0.25, 0.50 of 1.00)
          example: 1.0
        wedstrijdDuurMinuten:
          type: integer
          example: 75

    TeamConflictInfo:
      type: object
      description: Bestaande wedstrijd voor het team op de gevraagde datum
      properties:
        wedstrijd:
          type: string
          example: "VRC JO11-9JM - Valleivogels JO11-3"
        aanvangsTijd:
          type: string
          example: "11:30"
        eindTijd:
          type: string
          example: "12:45"
        veldNaam:
          type: string
          example: "veld 4"

    BeschikbaarVenster:
      type: object
      description: Beschikbaar tijdvenster per veld (modus zonder leeftijdscategorie)
      properties:
        veldNummer:
          type: integer
          example: 5
        veldNaam:
          type: string
          example: "veld 5"
        van:
          type: string
          example: "17:00"
        tot:
          type: string
          example: "19:20"
        maxDuurMinuten:
          type: integer
          example: 140
        opmerking:
          type: string
          nullable: true
          example: "Zonsondergang 21:28, geen kunstlicht"

    CheckAvailabilityRequest:
      type: object
      required:
        - datum
      properties:
        datum:
          type: string
          format: date
          description: Datum in yyyy-MM-dd formaat
          example: "2026-04-18"
        aanvangsTijd:
          type: string
          nullable: true
          description: Gewenste aftrapttijd HH:mm. Weglaten om beste slot te vinden.
          example: "12:00"
        dagdeel:
          type: string
          nullable: true
          enum: [ochtend, middag, avond]
          description: Dagdeelfilter
        leeftijdsCategorie:
          type: string
          nullable: true
          description: Leeftijdscategorie (bijv. JO13, MO17, VR, 1-99). Bepaalt duur en veldgrootte.
          example: "JO13"
        teamNaam:
          type: string
          nullable: true
          description: Teamnaam voor conflictcontrole en teamspecifieke regels
          example: "VRC JO13-1"
        tegenstander:
          type: string
          nullable: true
          description: Tegenstander (alleen voor administratie)
          example: "Ede JO13-2"
        wedstrijdDuurMinuten:
          type: integer
          nullable: true
          description: Overschrijf wedstrijdduur in minuten (standaard uit Speeltijden)

    CheckAvailabilityResponse:
      type: object
      properties:
        beschikbaar:
          type: boolean
        toewijzing:
          $ref: '#/components/schemas/SlotToewijzing'
          nullable: true
        teamConflict:
          $ref: '#/components/schemas/TeamConflictInfo'
          nullable: true
        reden:
          type: string
          nullable: true
        alternatieven:
          type: array
          items:
            $ref: '#/components/schemas/SlotToewijzing'
        beschikbareVensters:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/BeschikbaarVenster'
        waarschuwingen:
          type: array
          items:
            type: string

    BevestigRequest:
      type: object
      required:
        - datum
        - aanvangsTijd
        - veldNummer
      properties:
        datum:
          type: string
          format: date
          example: "2026-04-25"
        aanvangsTijd:
          type: string
          example: "12:00"
        veldNummer:
          type: integer
          example: 3
        leeftijdsCategorie:
          type: string
          nullable: true
          example: "JO13"
        teamNaam:
          type: string
          nullable: true
          example: "VRC JO13-1"
        tegenstander:
          type: string
          nullable: true
          example: "Ede JO13-2"
        aangevraagdDoor:
          type: string
          nullable: true
          example: "trainer@voorbeeld.nl"
        wedstrijdDuurMinuten:
          type: integer
          nullable: true

    BevestigResponse:
      type: object
      properties:
        id:
          type: integer
        datum:
          type: string
          format: date
        aanvangsTijd:
          type: string
        eindTijd:
          type: string
        veldNummer:
          type: integer
        status:
          type: string
          example: "Te bevestigen"

    ZoekWedstrijdRequest:
      type: object
      required:
        - teamNaam
        - datum
      properties:
        teamNaam:
          type: string
          description: Teamnaam (gedeeltelijke match ondersteund)
          example: "VRC JO8-2"
        datum:
          type: string
          format: date
          example: "2026-05-09"

    WedstrijdSamenvatting:
      type: object
      properties:
        wedstrijdcode:
          type: integer
          format: int64
          example: 12345678
        wedstrijd:
          type: string
          example: "VRC JO8-2 - Tegenstander JO8-1"
        datum:
          type: string
          format: date
        aanvangsTijd:
          type: string
        eindTijd:
          type: string
        veldNaam:
          type: string
          nullable: true
        leeftijdsCategorie:
          type: string
          nullable: true
        duurMinuten:
          type: integer
        veldDeelGebruik:
          type: number
          format: float

    HerplanCheckRequest:
      type: object
      required:
        - wedstrijdcode
      properties:
        wedstrijdcode:
          type: integer
          format: int64
          example: 12345678
        voorkeurTijd:
          type: string
          nullable: true
          description: Gewenste nieuwe tijd HH:mm
          example: "10:00"
        dagdeel:
          type: string
          nullable: true
          enum: [ochtend, middag, avond]
        richting:
          type: string
          nullable: true
          enum: [vervroegen, verlaten]
          description: Of alternatieven voor of na de huidige aanvangstijd mogen vallen

    HerplanCheckResponse:
      type: object
      properties:
        huidigeWedstrijd:
          $ref: '#/components/schemas/WedstrijdSamenvatting'
        beschikbaar:
          type: boolean
        alternatieven:
          type: array
          items:
            $ref: '#/components/schemas/SlotToewijzing'
        reden:
          type: string
          nullable: true
        waarschuwingen:
          type: array
          items:
            type: string

    HerplanBevestigRequest:
      type: object
      required:
        - wedstrijdcode
        - gewensteAanvangsTijd
      properties:
        wedstrijdcode:
          type: integer
          format: int64
          example: 12345678
        gewensteAanvangsTijd:
          type: string
          example: "10:00"
        gewenstVeldNummer:
          type: integer
          nullable: true
        aangevraagdDoor:
          type: string
          nullable: true
          example: "tegenstander via email"
        opmerking:
          type: string
          nullable: true
          example: "08:30 is niet haalbaar"

    HerplanBevestigResponse:
      type: object
      properties:
        id:
          type: integer
        wedstrijdcode:
          type: integer
          format: int64
        huidigeWedstrijd:
          type: string
        gewensteAanvangsTijd:
          type: string
        gewenstVeldNummer:
          type: integer
          nullable: true
        status:
          type: string
          example: "Aangevraagd"

    OptimaliseerRequest:
      type: object
      required:
        - datum
      properties:
        datum:
          type: string
          format: date
          example: "2026-04-18"
        doel:
          type: string
          nullable: true
          enum: [veld5-ontlasten, strakker-plannen]
          description: Optimalisatiedoel. Leeg = beide combineren.
        gewensteEindtijd:
          type: string
          nullable: true
          description: Gewenste eindtijd HH:mm. Standaard 16:15.
          example: "16:15"
        bufferMinuten:
          type: integer
          nullable: true
          description: Buffer tussen wedstrijden in minuten. Standaard 15.

    OptimalisatieSuggestie:
      type: object
      properties:
        wedstrijd:
          type: string
        huidigVeldNummer:
          type: integer
        huidigVeld:
          type: string
        huidigeTijd:
          type: string
        nieuwVeldNummer:
          type: integer
        nieuwVeld:
          type: string
        nieuweTijd:
          type: string
        reden:
          type: string

    OptimaliseerResponse:
      type: object
      properties:
        datum:
          type: string
          format: date
        huidigeEindtijd:
          type: string
        geschatteNieuweEindtijd:
          type: string
          nullable: true
        aantalVerplaatsingen:
          type: integer
        aantalVanVeld5Verplaatst:
          type: integer
        suggesties:
          type: array
          items:
            $ref: '#/components/schemas/OptimalisatieSuggestie'
        htmlPlanner:
          type: string
          description: HTML-plannerweergave (altijd meegegeven in JSON-modus)
        voldoendeRuimte:
          type: boolean
        voldoendeRuimteMelding:
          type: string
          nullable: true

    DoordeweeksBeschikbaarRequest:
      type: object
      properties:
        dagFilter:
          type: string
          nullable: true
          enum: [maandag, dinsdag, woensdag, donderdag]
          description: Filter op dag van de week. Leeg = alle doordeweekse dagen.
        duurMinuten:
          type: integer
          nullable: true
          description: Minimale duur in minuten
        leeftijdsCategorie:
          type: string
          nullable: true
          description: Leeftijdscategorie voor automatische duur

    DoordeweekseDatum:
      type: object
      properties:
        datum:
          type: string
          format: date
        dag:
          type: string
          example: "maandag"
        beschikbareVensters:
          type: array
          items:
            $ref: '#/components/schemas/BeschikbaarVenster'

    DoordeweeksBeschikbaarResponse:
      type: object
      properties:
        beschikbareDatums:
          type: array
          items:
            $ref: '#/components/schemas/DoordeweekseDatum'
        dagFilter:
          type: string
          nullable: true
        seizoenEinde:
          type: string
          format: date
        aantalBeschikbaar:
          type: integer

    TeamScheduleWedstrijd:
      type: object
      properties:
        datum:
          type: string
          format: date
        aanvangsTijd:
          type: string
        thuisUit:
          type: string
          enum: [thuis, uit]
        tegenstander:
          type: string
        type:
          type: string
          enum: [competitie, beker, oefenwedstrijd]
        veld:
          type: string
          nullable: true
        wedstrijdcode:
          type: integer
          format: int64
          nullable: true

    TeamScheduleZaterdag:
      type: object
      properties:
        datum:
          type: string
          format: date
        status:
          type: string
          enum: [vrij, oefenwedstrijd, bezet]
        bezetDoor:
          $ref: '#/components/schemas/TeamScheduleWedstrijd'
          nullable: true

    TeamScheduleResponse:
      type: object
      properties:
        team:
          type: string
        seizoenEinde:
          type: string
          format: date
        zaterdagen:
          type: array
          items:
            $ref: '#/components/schemas/TeamScheduleZaterdag'
        wedstrijden:
          type: array
          items:
            $ref: '#/components/schemas/TeamScheduleWedstrijd'

    # ── Beheer — AppSettings ───────────────────────────────────────────────────

    AppSettingsResponse:
      type: object
      description: |
        Niet-gevoelige AppSettings velden. SportlinkClientId en geheimen worden nooit teruggegeven.
      properties:
        ClubName:
          type: string
          nullable: true
        ClubCode:
          type: string
          nullable: true
        SportlinkApiUrl:
          type: string
          nullable: true
        SeasonStartMonth:
          type: integer
          nullable: true
        Accommodatie:
          type: string
          nullable: true
        LastSyncTimestamp:
          type: string
          format: date-time
          nullable: true
        FetchSchedule:
          type: string
          nullable: true
          description: CRON-expressie in 6-veld Azure-formaat
          example: "0 0 4 * * *"
        PlannerAfzenderNaam:
          type: string
          nullable: true
        CoordinatorNaam:
          type: string
          nullable: true
        CoordinatorFunctie:
          type: string
          nullable: true
        PlannerEmailAdres:
          type: string
          nullable: true
        HerplanDeadlineDagen:
          type: integer
          nullable: true
        BufferMinuten:
          type: integer
          nullable: true
        EmailVoetnoot:
          type: string
          nullable: true
        AccommodatiePlaats:
          type: string
          nullable: true
        AccommodatieLatitude:
          type: number
          format: double
          nullable: true
        AccommodatieLongitude:
          type: number
          format: double
          nullable: true
        UseRealtimeApi:
          type: boolean
          description: "true = live Sportlink API raadplegen bij plannercheck; false = alleen DB"
          default: true
        fetchScheduleLeesbaar:
          type: string
          nullable: true
          description: Leesbare weergave van de CRON-expressie
          example: "Elke dag om 04:00"
        volgendeMomenten:
          type: array
          nullable: true
          items:
            type: string
            format: date-time
          description: Eerstvolgende 3 uitvoertijden

    UpdateSettingsRequest:
      type: object
      description: |
        Wijzig toegestane AppSettings-velden. Velden buiten de witte lijst worden genegeerd.
        Witte lijst: HerplanDeadlineDagen, BufferMinuten, PlannerAfzenderNaam, CoordinatorNaam,
        CoordinatorFunctie, PlannerEmailAdres, Accommodatie, FetchSchedule, EmailVoetnoot,
        AccommodatiePlaats, AccommodatieLatitude, AccommodatieLongitude, UseRealtimeApi.
      properties:
        gewijzigdDoor:
          type: string
          description: Naam of ID van de beheerder die de wijziging doorvoert
          example: "beheerder@voorbeeld.nl"
        velden:
          type: object
          additionalProperties:
            type: string
            nullable: true
          description: Map van veldnaam naar nieuwe waarde
          example:
            BufferMinuten: "15"
            FetchSchedule: "0 0 4 * * *"

    UpdateSettingsResponse:
      type: object
      properties:
        gewijzigdeVelden:
          type: array
          items:
            type: string
        herstartVereist:
          type: boolean
          description: Handmatige herstart vereist als FetchSchedule gewijzigd maar Azure Management API niet geconfigureerd
        herstartAutomatisch:
          type: boolean
          description: Function App herstart automatisch via Azure Management API
        opmerking:
          type: string
          nullable: true
        fetchScheduleLeesbaar:
          type: string
          nullable: true
        volgendeMomenten:
          type: array
          nullable: true
          items:
            type: string
            format: date-time

    GeocodeResponse:
      type: object
      properties:
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
        displayName:
          type: string

    # ── Beheer — Sync ─────────────────────────────────────────────────────────

    SyncStatusResponse:
      type: object
      properties:
        lastSyncTimestamp:
          type: string
          format: date-time
          nullable: true
        fetchSchedule:
          type: string
          example: "0 0 4 * * *"
        status:
          type: string
          enum: [ok, geen-sync-uitgevoerd]

    SyncTriggerResponse:
      type: object
      properties:
        status:
          type: string
          example: "gestart"
        weekOffsetFrom:
          type: integer
        weekOffsetTo:
          type: integer
        tijdstip:
          type: string
          format: date-time

    # ── Beheer — Templates ────────────────────────────────────────────────────

    EmailTemplate:
      type: object
      properties:
        Id:
          type: integer
        TemplateKey:
          type: string
        Onderwerp:
          type: string
        BodyTemplate:
          type: string
        Actief:
          type: boolean
        ClubCode:
          type: string
        mta_inserted:
          type: string
          format: date-time
        mta_modified:
          type: string
          format: date-time
          nullable: true

    TemplatePutRequest:
      type: object
      required:
        - onderwerp
        - bodyTemplate
      properties:
        onderwerp:
          type: string
        bodyTemplate:
          type: string
        actief:
          type: boolean
          default: true
        gewijzigdDoor:
          type: string
          nullable: true

    TemplateResetResponse:
      type: object
      properties:
        templateKey:
          type: string
        verwijderd:
          type: integer
          description: Aantal verwijderde rijen
        status:
          type: string
          example: "hardcoded default actief"

    # ── Beheer — Email-log ────────────────────────────────────────────────────

    EmailLogItem:
      type: object
      description: AVG — EmailBody en AntwoordEmail worden nooit teruggegeven. Afzender gemaskeerd tot domein.
      properties:
        Id:
          type: integer
        MessageId:
          type: string
          nullable: true
        ConversationId:
          type: string
          nullable: true
        Afzender:
          type: string
          description: Gemaskeerd — alleen domein, bijv. "***@voorbeeld.nl"
          example: "***@voorbeeld.nl"
        Onderwerp:
          type: string
          nullable: true
        OntvangstDatum:
          type: string
          format: date-time
        VerzoekType:
          type: string
          nullable: true
        Status:
          type: string
          nullable: true
        VerstuurdNaar:
          type: string
          nullable: true
        FoutMelding:
          type: string
          nullable: true
        mta_inserted:
          type: string
          format: date-time
        mta_modified:
          type: string
          format: date-time
          nullable: true

    EmailLogResponse:
      type: object
      properties:
        count:
          type: integer
        limit:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/EmailLogItem'

    # ── Beheer — Uitgesloten emails ───────────────────────────────────────────

    UitgeslotenEmail:
      type: object
      properties:
        id:
          type: integer
        emailAdres:
          type: string
          format: email
        omschrijving:
          type: string
          nullable: true
        actief:
          type: boolean
        clubCode:
          type: string

    UitgeslotenEmailRequest:
      type: object
      required:
        - emailAdres
      properties:
        emailAdres:
          type: string
          format: email
        omschrijving:
          type: string
          nullable: true
        actief:
          type: boolean
          default: true

    # ── Beheer — Veldbeschikbaarheid ──────────────────────────────────────────

    VeldBeschikbaarheidItem:
      type: object
      properties:
        Id:
          type: integer
        VeldNummer:
          type: integer
        VeldNaam:
          type: string
        DagVanWeek:
          type: integer
          minimum: 1
          maximum: 7
          description: "ISO dag: 1=maandag … 7=zondag"
        BeschikbaarVanaf:
          type: string
          pattern: '^[0-2]\d:[0-5]\d$'
          description: HH:mm
          example: "08:30"
        BeschikbaarTot:
          type: string
          pattern: '^[0-2]\d:[0-5]\d$'
          example: "22:00"
        GebruikZonsondergang:
          type: boolean

    VeldBeschikbaarheidUpdateRequest:
      type: object
      required:
        - beschikbaarVanaf
        - beschikbaarTot
      properties:
        beschikbaarVanaf:
          type: string
          pattern: '^[0-2]\d:[0-5]\d$'
          example: "08:30"
        beschikbaarTot:
          type: string
          pattern: '^[0-2]\d:[0-5]\d$'
          example: "22:00"
        gebruikZonsondergang:
          type: boolean
          default: false

    VeldBeschikbaarheidCreateRequest:
      type: object
      required:
        - veldNummer
        - dagVanWeek
        - beschikbaarVanaf
        - beschikbaarTot
      properties:
        veldNummer:
          type: integer
        dagVanWeek:
          type: integer
          minimum: 1
          maximum: 7
        beschikbaarVanaf:
          type: string
          pattern: '^[0-2]\d:[0-5]\d$'
          example: "08:30"
        beschikbaarTot:
          type: string
          pattern: '^[0-2]\d:[0-5]\d$'
          example: "22:00"
        gebruikZonsondergang:
          type: boolean
          default: false

    VeldItem:
      type: object
      properties:
        VeldNummer:
          type: integer
        VeldNaam:
          type: string

    # ── Beheer — Voorkeurstijden ───────────────────────────────────────────────

    VoorkeurTijdItem:
      type: object
      properties:
        Id:
          type: integer
        TeamNaam:
          type: string
        DagVanWeek:
          type: integer
          minimum: 1
          maximum: 7
        VoorkeurTijd:
          type: string
          description: HH:mm
        Prioriteit:
          type: integer
          default: 5
        Actief:
          type: boolean
        ClubCode:
          type: string
        mta_inserted:
          type: string
          format: date-time
        mta_modified:
          type: string
          format: date-time
          nullable: true

    VoorkeurTijdRequest:
      type: object
      required:
        - teamNaam
        - dagVanWeek
        - voorkeurTijd
      properties:
        teamNaam:
          type: string
        dagVanWeek:
          type: integer
          minimum: 1
          maximum: 7
          description: "6 = zaterdag"
        voorkeurTijd:
          type: string
          pattern: '^[0-2]\d:[0-5]\d$'
          example: "10:00"
        prioriteit:
          type: integer
          default: 5
        actief:
          type: boolean
          default: true

    # ── Beheer — Teamregels ────────────────────────────────────────────────────

    TeamRegelItem:
      type: object
      properties:
        Id:
          type: integer
        TeamNaam:
          type: string
        RegelType:
          type: string
          enum: [BufferVoor, BufferNa, VoorkeurVeld]
        WaardeMinuten:
          type: integer
          nullable: true
        WaardeVeldNummer:
          type: integer
          nullable: true
        WaardeTijd:
          type: string
          nullable: true
          description: HH:mm
        Prioriteit:
          type: integer
        Actief:
          type: boolean
        Opmerking:
          type: string
          nullable: true
        ClubCode:
          type: string

    TeamRegelRequest:
      type: object
      required:
        - teamNaam
        - regelType
      properties:
        teamNaam:
          type: string
        regelType:
          type: string
          enum: [BufferVoor, BufferNa, VoorkeurVeld]
        waardeMinuten:
          type: integer
          nullable: true
          description: Verplicht bij BufferVoor en BufferNa
        waardeVeldNummer:
          type: integer
          nullable: true
          description: Verplicht bij VoorkeurVeld
        waardeTijd:
          type: string
          nullable: true
          pattern: '^[0-2]\d:[0-5]\d$'
        prioriteit:
          type: integer
          default: 0
        actief:
          type: boolean
          default: true
        opmerking:
          type: string
          nullable: true

    # ── Email test ────────────────────────────────────────────────────────────

    TestEmailRequest:
      type: object
      required:
        - body
      properties:
        onderwerp:
          type: string
          nullable: true
        afzender:
          type: string
          nullable: true
          example: "trainer@voorbeeld.nl"
        afzenderNaam:
          type: string
          nullable: true
          example: "Jan de Vries"
        body:
          type: string
          description: Emailtekst om te classificeren (verplicht)

    TestEmailResponse:
      type: object
      properties:
        dryRun:
          type: boolean
          example: true
        opmerking:
          type: string
          example: "Dit verstuurt niets en slaat niets op"
        classificatie:
          type: object
          description: AI-classificatieresultaat
        plannerResponse:
          type: object
          description: Planner-respons op basis van de classificatie (geen DB-mutatie)
        voorbeeldAntwoord:
          type: object
          properties:
            onderwerp:
              type: string
            body:
              type: string

    # ── Feedback ──────────────────────────────────────────────────────────────

    VraagAntwoord:
      type: object
      properties:
        vraag:
          type: string
        antwoord:
          type: string

    FeedbackContext:
      type: object
      properties:
        pagina:
          type: string
          description: Huidige pagina/route in de admin UI
        versie:
          type: string
          description: Applicatieversie
        rol:
          type: string
        browser:
          type: string

    FeedbackRequest:
      type: object
      required:
        - beschrijving
      properties:
        type:
          type: string
          enum: [Fout, Verzoek, Vraag]
          description: Type melding
        beschrijving:
          type: string
          description: Omschrijving van het probleem of verzoek (max 2000 tekens)
        vragenAntwoorden:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/VraagAntwoord'
        context:
          $ref: '#/components/schemas/FeedbackContext'
          nullable: true

    FeedbackValidateResponse:
      type: object
      properties:
        volledig:
          type: boolean
          description: Of de beschrijving voldoende informatie bevat
        vragen:
          type: array
          description: Aanvulvragen als niet volledig (max 3)
          items:
            type: string

    FeedbackSubmitResponse:
      type: object
      properties:
        issueNummer:
          type: integer
          description: GitHub issue nummer
        issueUrl:
          type: string
          format: uri
          description: URL naar het aangemaakte GitHub issue

# =============================================================================
# Paden
# =============================================================================
paths:

  # ── Core ────────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [core]
      operationId: getHealth
      summary: Status en versie van de API
      description: Geeft de actuele status en assemblyversie terug. Geen authenticatie vereist.
      security: []
      responses:
        '200':
          description: API is beschikbaar
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  version:
                    type: string
                    example: "2.2.0.0"
                  timestamp:
                    type: string
                    format: date-time

  /sync-matches:
    get:
      tags: [core]
      operationId: syncMatches
      summary: Handmatige Sportlink synchronisatie starten
      description: |
        Start een volledige Sportlink API-synchronisatie (teams, wedstrijden, wedstrijddetails).
        Vereist de Azure Master key via `?code=`.

        - **Standaard**: vorige week t/m einde seizoen (weekOffset -1 tot seizoenEinde)
        - **Reset-modus**: `?reset=true&season=YYYY` — volledig seizoen vanaf startjaar
      security:
        - functionKey: []
      parameters:
        - name: reset
          in: query
          required: false
          schema:
            type: boolean
          description: true = volledig seizoen synchroniseren i.p.v. incrementeel
        - name: season
          in: query
          required: false
          schema:
            type: integer
            example: 2025
          description: Startjaar seizoen (bijv. 2025 = seizoen 2025/2026). Gebruik samen met reset=true.
      responses:
        '200':
          description: Synchronisatie voltooid
          content:
            application/json:
              schema:
                type: string
                example: "Sync completed. WeekOffset range: -1 to 42."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ── Planner ─────────────────────────────────────────────────────────────────

  /planner/check-availability:
    post:
      tags: [planner]
      operationId: checkAvailability
      summary: Veldbeschikbaarheid controleren
      description: |
        Controleer of een veld beschikbaar is voor een (oefen)wedstrijd.

        Drie modi:
        1. **Slot toewijzen** — `leeftijdsCategorie` opgegeven: zoekt beste beschikbare slot
        2. **Alternatieven** — gevraagd tijdstip bezet: geeft tot 3 alternatieven terug
        3. **Vrije vensters** — geen `leeftijdsCategorie`: geeft alle open tijdvensters per veld

        Controleert ook teamconflicten als `teamNaam` opgegeven is.
      security:
        - functionKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckAvailabilityRequest'
      responses:
        '200':
          description: Beschikbaarheidsresultaat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckAvailabilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /planner/bevestig:
    post:
      tags: [planner]
      operationId: bevestigWedstrijd
      summary: Wedstrijdslot boeken
      description: |
        Bevestigt en boekt een wedstrijdslot. Schrijft naar `planner.GeplandeWedstrijden`.
        Status wordt altijd als `"Te bevestigen"` aangemaakt.
      security:
        - functionKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BevestigRequest'
      responses:
        '200':
          description: Wedstrijd geboekt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BevestigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /planner/populate-sunset:
    post:
      tags: [planner]
      operationId: populateSunset
      summary: Zonsondergangtabel vullen
      description: |
        Vult de `DateTable` met NOAA-berekende zonsondergangtijden voor het accommodatiecoördinaat.
        Eenmalig uitvoeren na initiële setup, of wanneer het seizoen/datumbereik wordt uitgebreid.
        Vereist de Azure Master key.
      security:
        - functionKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Tabel gevuld
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Sunset data populated from 2026-01-01 to 2027-12-31."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /planner/zoek-wedstrijd:
    post:
      tags: [planner]
      operationId: zoekWedstrijd
      summary: Bestaande wedstrijd opzoeken
      description: |
        Zoek een bestaande competitiewedstrijd op basis van teamnaam en datum.
        Gedeeltelijke teamnaam-match is ondersteund.
      security:
        - functionKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoekWedstrijdRequest'
      responses:
        '200':
          description: Zoekresultaat (gevonden of niet gevonden)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      gevonden:
                        type: boolean
                        example: true
                      wedstrijd:
                        $ref: '#/components/schemas/WedstrijdSamenvatting'
                  - type: object
                    properties:
                      gevonden:
                        type: boolean
                        example: false
                      reden:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /planner/herplan-check:
    post:
      tags: [planner]
      operationId: herplanCheck
      summary: Herplan-alternatieven simuleren
      description: |
        Berekent alternatieve tijdsloten voor een bestaande wedstrijd.
        **Voert niets door** — puur simulatie waarbij het huidige slot als vrij wordt beschouwd.
      security:
        - functionKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HerplanCheckRequest'
      responses:
        '200':
          description: Herplan-alternatieven
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HerplanCheckResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /planner/herplan-bevestig:
    post:
      tags: [planner]
      operationId: herplanBevestig
      summary: Herplanverzoek registreren
      description: |
        Registreert een herplanverzoek met status `"Aangevraagd"`.
        **Wijzigt de wedstrijd niet** — de feitelijke aanpassing in Sportlink is een handmatig proces.
      security:
        - functionKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HerplanBevestigRequest'
      responses:
        '200':
          description: Herplanverzoek geregistreerd
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HerplanBevestigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /planner/optimaliseer:
    post:
      tags: [planner]
      operationId: optimaliseer
      summary: Planningsoptimalisatie berekenen
      description: |
        Analyseert de planning voor een datum en genereert optimalisatiesuggesties.
        **Voert niets door** — alleen advies.

        **Output-formaten** (via `?format=`):
        - *(geen)* — JSON met suggesties
        - `html` — interactieve browser-HTML met plannervisualisatie
        - `email` — email-compatibele HTML met link naar browser-versie
      security:
        - functionKey: []
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [html, email]
          description: Outputformaat. Leeg = JSON.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimaliseerRequest'
      responses:
        '200':
          description: Optimalisatieresultaat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimaliseerResponse'
            text/html:
              schema:
                type: string
                description: HTML plannerweergave (bij ?format=html of ?format=email)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /planner/doordeweeks-beschikbaar:
    post:
      tags: [planner]
      operationId: doordeweeksBeschikbaar
      summary: Doordeweekse beschikbaarheid opvragen
      description: |
        Geeft beschikbare doordeweekse avondsloten (ma–do) t/m het einde van het seizoen.
        Optioneel gefilterd op dag en duur/leeftijdscategorie.
      security:
        - functionKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoordeweeksBeschikbaarRequest'
      responses:
        '200':
          description: Beschikbare doordeweekse datums
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoordeweeksBeschikbaarResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /planner/team-schedule:
    get:
      tags: [planner]
      operationId: getTeamSchedule
      summary: Teamschema ophalen
      description: |
        Geeft alle wedstrijden voor een team t/m het seizoenseinde, inclusief een overzicht per
        zaterdag (vrij / oefenwedstrijd / bezet).

        Optioneel `?format=html` voor een HTML-weergave.
      security:
        - functionKey: []
      parameters:
        - name: team
          in: query
          required: true
          schema:
            type: string
          description: Exacte teamnaam
          example: "VRC JO13-1"
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [html]
          description: html = HTML-weergave teruggeven i.p.v. JSON
      responses:
        '200':
          description: Teamschema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamScheduleResponse'
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ── Beheer ───────────────────────────────────────────────────────────────────

  /beheer/settings:
    get:
      tags: [beheer]
      operationId: getSettings
      summary: Club-instellingen ophalen
      description: |
        Leest niet-gevoelige AppSettings velden. SportlinkClientId en geheimen worden nooit
        teruggegeven. Voegt een leesbare CRON-preview toe als FetchSchedule aanwezig is.
      security:
        - easyAuth: []
      responses:
        '200':
          description: AppSettings
          headers:
            x-correlation-id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Geen AppSettings-rij gevonden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [beheer]
      operationId: updateSettings
      summary: Club-instellingen bijwerken
      description: |
        Werkt toegestane AppSettings-velden bij en schrijft een audit-regel naar `dbo.AppSettingsAudit`.
        Bij wijziging van `FetchSchedule` herstart de Function App automatisch (als Azure Management API
        geconfigureerd is). Velden buiten de witte lijst worden genegeerd.
      security:
        - easyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'
      responses:
        '200':
          description: Instellingen opgeslagen
          headers:
            x-correlation-id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSettingsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /beheer/geocode:
    get:
      tags: [beheer]
      operationId: geocode
      summary: GPS-coördinaten opzoeken
      description: |
        Zoekt GPS-coördinaten op voor een plaatsnaam via Nominatim (OpenStreetMap).
        Gebruik om `AccommodatieLatitude` en `AccommodatieLongitude` in AppSettings te vullen.
        Rate-limit: 1 req/sec per Nominatim ToS.
      security:
        - easyAuth: []
      parameters:
        - name: plaatsnaam
          in: query
          required: true
          schema:
            type: string
            maxLength: 100
          description: Nederlandse plaatsnaam of adres om op te zoeken
          example: "Veenendaal"
      responses:
        '200':
          description: Coördinaten gevonden
          headers:
            x-correlation-id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Geen resultaat voor de opgegeven plaatsnaam
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
          description: Geocoding service tijdelijk niet beschikbaar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Geocoding service time-out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /beheer/sync/status:
    get:
      tags: [beheer]
      operationId: getSyncStatus
      summary: Synchronisatiestatus ophalen
      description: Geeft het tijdstip van de laatste Sportlink-synchronisatie en het huidige FetchSchedule.
      security:
        - easyAuth: []
      responses:
        '200':
          description: Synchronisatiestatus
          headers:
            x-correlation-id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /beheer/sync/trigger:
    post:
      tags: [beheer]
      operationId: triggerSync
      summary: Synchronisatie starten (fire-and-forget)
      description: |
        Start een Sportlink-synchronisatie op de achtergrond (~5 minuten). Retourneert direct 202.
        Prik op `GET /beheer/sync/status` om de voortgang te bewaken via `lastSyncTimestamp`.
      security:
        - easyAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Synchronisatie gestart
          headers:
            x-correlation-id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncTriggerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /beheer/teams:
    get:
      tags: [beheer]
      operationId: getTeams
      summary: Teamlijst ophalen
      description: |
        Geeft alle actieve teamnamen uit `his.teams`, gefilterd op ClubCode.
        Gebruikt door de Blazor Admin UI voor dropdowns in voorkeurstijden en teamregels.
      security:
        - easyAuth: []
      responses:
        '200':
          description: Lijst van teamnamen
          headers:
            x-correlation-id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["VRC 1", "VRC JO13-1", "VRC JO17-1"]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /beheer/templates:
    get:
      tags: [beheer]
      operationId: getTemplates
