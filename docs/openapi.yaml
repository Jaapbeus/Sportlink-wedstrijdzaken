        - name: tot
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Einddatum filter (exclusief) in yyyy-MM-dd
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filter op statuswaarde
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
          description: Maximum aantal terug te geven rijen (standaard 50, max 200)
